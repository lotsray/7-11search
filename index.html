<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>門市查詢系統</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      padding: 20px;
      background: #f5f6fa;
      margin: 0;
    }

    .box {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 28px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      width: 250px;
    }

    .store {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .name {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .info {
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      margin: 10px 0 16px;
      color: #555;
    }

    .error {
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>門市查詢</h1>

    <select id="county">
      <option value="">載入中...</option>
    </select>

    <div id="status" class="status">初始化中...</div>
    <div id="list"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxElt9LegASM2NpC-IoLCtr_mQvt5dMWghZv7RiKE-e3lIMYu42fLeBOpkC5Y2WzPZR/exec";

    const countySelect = document.getElementById("county");
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }
      return await res.json();
    }

    async function loadCounties() {
      try {
        statusEl.classList.remove("error");
        statusEl.innerText = "載入縣市中...";

        const data = await fetchJson(`${GAS_URL}?action=getCounties`);

        if (!data.success) {
          throw new Error(data.message || "載入失敗");
        }

        countySelect.innerHTML = `<option value="">請選擇縣市</option>`;

        data.counties.forEach(county => {
          const op = document.createElement("option");
          op.value = county;
          op.textContent = county;
          countySelect.appendChild(op);
        });

        statusEl.innerText = "請選擇縣市";
      } catch (err) {
        countySelect.innerHTML = `<option value="">載入失敗</option>`;
        statusEl.classList.add("error");
        statusEl.innerText = "縣市載入失敗：" + err.message;
      }
    }

    async function loadStores(county) {
      if (!county) {
        listEl.innerHTML = "";
        statusEl.classList.remove("error");
        statusEl.innerText = "請選擇縣市";
        return;
      }

      try {
        statusEl.classList.remove("error");
        statusEl.innerText = "查詢中...";
        listEl.innerHTML = "";

        const data = await fetchJson(`${GAS_URL}?action=getStores&county=${encodeURIComponent(county)}`);

        if (!data.success) {
          throw new Error(data.message || "查詢失敗");
        }

        statusEl.innerText = `${county} 共 ${data.total} 間`;

        if (!data.stores || data.stores.length === 0) {
          listEl.innerHTML = `<div class="store">此縣市目前沒有資料。</div>`;
          return;
        }

        listEl.innerHTML = data.stores.map(store => `
          <div class="store">
            <div class="name">${escapeHtml(store.storeName)}</div>
            <div class="info">
              店號：${escapeHtml(store.storeId)}<br>
              地址：${escapeHtml(store.address)}<br>
              電話：${escapeHtml(store.phone)}
            </div>
          </div>
        `).join("");
      } catch (err) {
        statusEl.classList.add("error");
        statusEl.innerText = "查詢失敗：" + err.message;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    countySelect.addEventListener("change", (e) => {
      loadStores(e.target.value);
    });

    loadCounties();
  </script>
</body>
</html>
