<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>門市查詢系統</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      padding: 20px;
      background: #f5f6fa;
      margin: 0;
    }
    .box {
      max-width: 960px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }
    select, button {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }
    button { cursor: pointer; }
    button:hover { background: #f3f3f3; }
    .status {
      margin: 10px 0 16px;
      color: #555;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .error { color: #c62828; }
    .store {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .name {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .info {
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
    }
    .distance {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      background: #e8f0fe;
      border-radius: 999px;
      font-size: 13px;
    }
    a.map-link {
      color: #1565c0;
      text-decoration: none;
    }
    a.map-link:hover {
      text-decoration: underline;
    }
    .note {
      font-size: 13px;
      color: #777;
      margin-top: 6px;
    }
    @media (max-width: 600px) {
      .box {
        margin: 16px;
        padding: 18px;
      }
      h1 {
        font-size: 24px;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      select, button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>門市查詢</h1>

    <div class="controls">
      <select id="county">
        <option value="">載入中...</option>
      </select>
      <button id="nearestBtn" type="button">查最近門市</button>
    </div>

    <div id="status" class="status">初始化中...</div>
    <div class="note">查最近門市時，瀏覽器會要求定位權限。</div>
    <div id="list"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxYmYySz5-uwJ4wHzeFiG4DqtqcMQ6gWrUngyCN4V4C8wnZ4De83gaa_8nN5QLMzZx0/exec";

    const countySelect = document.getElementById("county");
    const nearestBtn = document.getElementById("nearestBtn");
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");

    async function fetchJson(url) {
      try {
        const res = await fetch(url, {
          method: "GET",
          redirect: "follow",
          cache: "no-store"
        });

        const text = await res.text();

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} - ${text}`);
        }

        try {
          return JSON.parse(text);
        } catch (e) {
          throw new Error("回傳內容不是 JSON：" + text);
        }
      } catch (err) {
        throw new Error("無法連線到 GAS：" + err.message);
      }
    }

    async function loadCounties() {
      try {
        statusEl.classList.remove("error");
        statusEl.innerText = "載入縣市中...";

        const data = await fetchJson(`${GAS_URL}?action=getCounties`);

        if (!data.success) {
          throw new Error(data.message || "載入失敗");
        }

        countySelect.innerHTML = `<option value="">請選擇縣市</option>`;

        data.counties.forEach(county => {
          const option = document.createElement("option");
          option.value = county;
          option.textContent = county;
          countySelect.appendChild(option);
        });

        statusEl.innerText = "請選擇縣市，或使用「查最近門市」。";
      } catch (err) {
        countySelect.innerHTML = `<option value="">載入失敗</option>`;
        statusEl.classList.add("error");
        statusEl.innerText = "縣市載入失敗：\n" + err.message;
      }
    }

    async function loadStores(county) {
      if (!county) {
        listEl.innerHTML = "";
        statusEl.classList.remove("error");
        statusEl.innerText = "請選擇縣市，或使用「查最近門市」。";
        return;
      }

      try {
        statusEl.classList.remove("error");
        statusEl.innerText = "查詢中...";
        listEl.innerHTML = "";

        const data = await fetchJson(`${GAS_URL}?action=getStores&county=${encodeURIComponent(county)}`);

        if (!data.success) {
          throw new Error(data.message || "查詢失敗");
        }

        statusEl.innerText = `${county} 共 ${data.total} 間門市`;
        renderStores(data.stores || [], false);
      } catch (err) {
        statusEl.classList.add("error");
        statusEl.innerText = "查詢失敗：\n" + err.message;
        listEl.innerHTML = "";
      }
    }

    async function findNearestStores() {
      try {
        statusEl.classList.remove("error");
        statusEl.innerText = "正在取得目前位置...";

        const position = await getCurrentPosition();
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        statusEl.innerText = "正在讀取門市資料...";
        const data = await fetchJson(`${GAS_URL}?action=getAllStores`);

        if (!data.success) {
          throw new Error(data.message || "無法取得門市資料");
        }

        const storesWithCoords = (data.stores || []).filter(store =>
          typeof store.lat === "number" &&
          !isNaN(store.lat) &&
          typeof store.lng === "number" &&
          !isNaN(store.lng)
        );

        if (storesWithCoords.length === 0) {
          statusEl.innerText = "目前沒有可用的經緯度資料。";
          listEl.innerHTML = "";
          return;
        }

        const results = storesWithCoords.map(store => ({
          ...store,
          distanceKm: haversineKm(userLat, userLng, store.lat, store.lng)
        }));

        results.sort((a, b) => a.distanceKm - b.distanceKm);

        const top10 = results.slice(0, 10);

        statusEl.innerText = `已為你找出最近的 ${top10.length} 間門市`;
        renderStores(top10, true);

      } catch (err) {
        statusEl.classList.add("error");
        statusEl.innerText = "查最近門市失敗：\n" + err.message;
        listEl.innerHTML = "";
      }
    }

    function getCurrentPosition() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("此瀏覽器不支援定位功能"));
          return;
        }

        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        });
      });
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function renderStores(stores, showDistance = false) {
      if (!stores || stores.length === 0) {
        listEl.innerHTML = `<div class="store">目前沒有符合的門市資料。</div>`;
        return;
      }

      listEl.innerHTML = stores.map(store => {
        const fullAddress = `${store.county || ""}${store.address || ""}`.trim();
        const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}`;

        return `
          <div class="store">
            <div class="name">${escapeHtml(store.storeName)}</div>
            <div class="info">
              店號：${escapeHtml(store.storeId)}<br>
              縣市：${escapeHtml(store.county)}<br>
              地址：<a class="map-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(store.address)}</a><br>
              電話：${escapeHtml(store.phone)}
              ${showDistance && typeof store.distanceKm === "number"
                ? `<div class="distance">距離約 ${store.distanceKm.toFixed(2)} 公里</div>`
                : ``}
            </div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    countySelect.addEventListener("change", (e) => {
      loadStores(e.target.value);
    });

    nearestBtn.addEventListener("click", () => {
      findNearestStores();
    });

    loadCounties();
  </script>
</body>
</html>
